[build]
  command   = "npm install"
  functions = "netlify/functions"
  publish   = "public"
  # Only rebuild when files that Netlify actually serves or bundles change.
  # Compares the last successfully-deployed commit ($CACHED_COMMIT_REF) against
  # the current one ($COMMIT_REF) so that multi-commit pushes don't accidentally
  # skip a frontend change hidden behind a later docs-only commit.
  # Covered paths (rebuild needed):
  #   public/       — static site
  #   netlify/      — serverless functions
  #   netlify.toml  — build config itself
  #   package.json  — function dependency pins
  # Everything else (scripts/, .github/, CLAUDE.md, TASKS.md, .gitignore, …)
  # goes to GitHub only and does NOT burn Netlify build minutes.
  ignore = "git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF -- public/ netlify/ netlify.toml package.json"

[build.environment]
  NODE_VERSION = "20"
  # RPC_URL is a public Base RPC endpoint, not a real secret.
  # Netlify's scanner flags it because it's marked sensitive in the dashboard
  # and its value (https://mainnet.base.org) appears as a fallback in source files.
  SECRETS_SCAN_OMIT_KEYS = "RPC_URL"

[functions]
  node_bundler = "esbuild"

[functions."create-market"]
  timeout = 26

