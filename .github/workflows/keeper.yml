name: TrainBets Keeper

on:
  # The 5-minute schedule is disabled while the site is paused — re-enable
  # by uncommenting the cron line below.
  # schedule:
  #   - cron: "*/5 * * * *"   # every 5 minutes (GitHub Actions minimum)
  workflow_dispatch:          # manual trigger only (Actions tab → Run workflow)

# Prevent two keeper runs from overlapping — queue the next one, don't cancel
concurrency:
  group: keeper
  cancel-in-progress: false

jobs:
  keeper:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - uses: actions/checkout@v4

      # Node 20 matches the Netlify build (netlify.toml NODE_VERSION).
      # No `cache: "npm"` because package-lock.json is gitignored — enabling the
      # cache makes setup-node fail looking for the lockfile (the cause of the
      # red runs you saw in the Actions tab).
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install --no-package-lock

      - name: Run oracle keeper
        env:
          TRAFIKVERKET_API_KEY: ${{ secrets.TRAFIKVERKET_API_KEY }}
          KEEPER_PRIVATE_KEY:   ${{ secrets.KEEPER_PRIVATE_KEY }}
          RPC_URL:              "https://mainnet.base.org"
          CONTRACT_ADDRESS:     "0xB54bCee43ACad2c99e59Bc89f19823181DA4ceF9"
        run: node scripts/keeper.mjs 2>&1 | tee keeper.log

      - name: Upload keeper log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: keeper-log-${{ github.run_id }}
          path: keeper.log
          retention-days: 7
