name: Auto-merge Claude PRs

# Automatically merges any PR opened from a claude/* branch.
# This lets the Claude Code web assistant push changes without manual PR review.

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  auto-merge:
    if: startsWith(github.head_ref, 'claude/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Merge PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --squash \
            --admin \
            --delete-branch
