name: Auto-merge Claude PRs

# When Claude Code pushes to a claude/* branch, automatically create a PR
# and immediately merge it to main — no human action required.

on:
  push:
    branches:
      - 'claude/**'

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Create PR and merge into main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="${{ github.repository }}"
          BRANCH="${{ github.ref_name }}"

          # Find existing open PR, or create a new one
          PR_URL=$(gh pr list --repo "$REPO" --head "$BRANCH" --state open --json url --jq '.[0].url' 2>/dev/null)

          if [ -z "$PR_URL" ]; then
            PR_URL=$(gh pr create \
              --repo "$REPO" \
              --head "$BRANCH" \
              --base main \
              --title "Auto: $BRANCH" \
              --body "Automated changes from Claude Code")
          fi

          echo "Merging PR: $PR_URL"

          # Merge via PR URL — --admin bypasses required status checks (Netlify build)
          gh pr merge "$PR_URL" \
            --repo "$REPO" \
            --squash \
            --admin \
            --delete-branch
