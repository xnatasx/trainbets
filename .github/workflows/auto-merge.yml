name: Auto-merge Claude PRs

# When Claude Code pushes to a claude/* branch, automatically create a PR
# and immediately merge it to main — no human action required.

on:
  push:
    branches:
      - 'claude/**'

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Create PR and merge into main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${{ github.ref_name }}"
          REPO="${{ github.repository }}"

          # Create PR (ignore error if one already exists)
          gh pr create \
            --repo "$REPO" \
            --head "$BRANCH" \
            --base main \
            --title "Auto: $BRANCH" \
            --body "Automated changes from Claude Code" 2>/dev/null || true

          # Wait for GitHub to finish computing mergeability
          sleep 8

          # Try squash merge first (cleaner history), fall back to regular merge
          # Use --admin to bypass any branch protection rules
          gh pr merge "$BRANCH" \
            --repo "$REPO" \
            --squash \
            --admin \
            --delete-branch \
          || gh pr merge "$BRANCH" \
            --repo "$REPO" \
            --merge \
            --admin \
            --delete-branch
