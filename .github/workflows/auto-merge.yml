name: Auto-merge Claude PRs

# When Claude Code pushes to a claude/* branch, automatically create a PR
# and immediately merge it to main — no human action required.

on:
  push:
    branches:
      - 'claude/**'

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Merge branch into main via API
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="${{ github.repository }}"
          BRANCH="${{ github.ref_name }}"

          # Use GitHub merge API — only requires contents:write, no admin or status checks
          RESULT=$(curl -s -o /tmp/merge_result.json -w "%{http_code}" \
            -X POST "https://api.github.com/repos/$REPO/merges" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Content-Type: application/json" \
            -d "{\"base\":\"main\",\"head\":\"$BRANCH\",\"commit_message\":\"Auto-merge $BRANCH\"}")

          echo "HTTP status: $RESULT"
          cat /tmp/merge_result.json

          if [ "$RESULT" = "201" ] || [ "$RESULT" = "204" ]; then
            echo "Merged successfully"
            curl -s -X DELETE \
              "https://api.github.com/repos/$REPO/git/refs/heads/$BRANCH" \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" || true
          else
            echo "Merge failed with HTTP $RESULT" >&2
            exit 1
          fi
