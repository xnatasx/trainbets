name: Auto-merge Claude PRs

# When Claude Code pushes to a claude/* branch, automatically create a PR
# and immediately merge it to main — no human action required.

on:
  push:
    branches:
      - 'claude/**'

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Create PR and merge into main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Create PR (suppress error if one already exists for this branch)
          gh pr create \
            --repo "${{ github.repository }}" \
            --head "${{ github.ref_name }}" \
            --base main \
            --title "Auto: ${{ github.ref_name }}" \
            --body "Automated changes from Claude Code" 2>/dev/null || true

          # Merge the open PR for this branch (squash + delete branch)
          gh pr merge "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --squash \
            --delete-branch
