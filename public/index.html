<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0a0e1a">
  <title>TrainBets — Predict Train Arrivals</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0e1a;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
    }
    .logo { font-size: 3rem; }
    h1 { font-size: 2rem; font-weight: 700; color: #6366f1; }
    p { color: #94a3b8; font-size: 1.1rem; text-align: center; max-width: 400px; line-height: 1.6; }
    .badge {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 9999px;
      padding: 0.5rem 1.25rem;
      font-size: 0.85rem;
      color: #6366f1;
    }
    .pulse {
      width: 12px; height: 12px;
      background: #22c55e;
      border-radius: 50%;
      display: inline-block;
      margin-right: 6px;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
  </style>
</head>
<body>
  <div class="logo">🚆</div>
  <h1>TrainBets</h1>
  <p>Prediction markets for Swedish train delays — powered by USDC on Base.</p>
  <span class="badge"><span class="pulse"></span>Oracle active — markets updating every 30 min</span>
  <p style="font-size:0.9rem; color:#475569;">Full interface loading soon.</p>
</body>
</html>
